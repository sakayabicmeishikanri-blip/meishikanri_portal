name: GCS Test
on: [push]

jobs:
  test-auth:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # これが必須！

    steps:
      - uses: actions/checkout@v4

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/308432369710/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'githubmeishikanri@github-actions-bot.iam.gserviceaccount.com'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Verify Authentication'
        run: gcloud auth list # これで認証が通っているか表示される
