<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>酒ゃビック名刺管理システム</title>
  <style>
    body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #000; color: white; }
    #video { width: 100%; height: 50vh; object-fit: cover; }
    #snap { width: 80%; padding: 20px; margin: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; }
    #guide-frame { position: absolute; top: 20%; left: 10%; width: 80%; height: 20%; border: 2px solid yellow; box-sizing: border-box; pointer-events: none; }
    #outputCanvas { width: 90%; margin-top: 10px; border: 2px solid green; }
  </style>
</head>
<body>
  <h1>名刺読み取り</h1>
  <div id="camera-container" style="position: relative; width: 100%;">
    <video id="video" playsinline autoplay></video>
    <div id="guide-frame"></div>
  </div>
  <button id="snap">撮影して輪郭を検出</button>
  <div>検出結果:</div>
  <canvas id="outputCanvas"></canvas>

  <script>
    // 1. 関数を先に定義
    function onOpenCvReady() {
      console.log("OpenCV.js is ready!");
      startCamera();
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } }
        });
        document.getElementById('video').srcObject = stream;
      } catch (err) {
        alert("カメラ起動失敗: " + err.message);
      }
    }

    // 2. 動的にOpenCVを読み込む（エラー回避のため）
    let script = document.createElement('script');
    script.src = "https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.js";
    script.onload = onOpenCvReady;
    document.body.appendChild(script);

    // 3. 撮影ボタンの処理
    let src, dst;
    document.getElementById('snap').addEventListener('click', () => {
      const video = document.getElementById('video');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);

      if (src) src.delete();
      if (dst) dst.delete();

      src = cv.imread(canvas);
      dst = new cv.Mat();
      let gray = new cv.Mat();
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

      let blurred = new cv.Mat();
      cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
      let edged = new cv.Mat();
      cv.Canny(blurred, edged, 75, 200);

      cv.imshow('outputCanvas', edged);
      gray.delete(); blurred.delete(); edged.delete();
    });
  </script>
</body>
</html>
