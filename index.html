<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { background: #000; color: white; text-align: center; }
    #video { width: 100%; height: 40vh; object-fit: cover; }
    #snap { width: 80%; padding: 20px; margin: 20px; font-size: 18px; background: #007bff; color: white; }
    #outputCanvas { width: 90%; margin-top: 20px; border: 3px solid red; background: #333; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.js"></script>
</head>
<body>
  <video id="video" playsinline autoplay></video>
  <button id="snap">グレースケール変換テスト</button>
  <canvas id="outputCanvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('outputCanvas');

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } }
        });
        video.srcObject = stream;
        video.play();
      } catch (err) { alert("カメラ起動失敗: " + err); }
    }
    startCamera();

    document.getElementById('snap').addEventListener('click', () => {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = video.videoWidth;
      tempCanvas.height = video.videoHeight;
      tempCanvas.getContext('2d').drawImage(video, 0, 0);

      // 1. OpenCVで読み込み
      let src = cv.imread(tempCanvas);
      let dst = new cv.Mat();
      let gray = new cv.Mat();
      let canny = new cv.Mat();
      let contours = new cv.MatVector();
      let hierarchy = new cv.Mat();

      // 2. グレースケール → ぼかし → エッジ検出（Canny）
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0);
      cv.Canny(gray, canny, 50, 150);

      // 3. 輪郭を探す
      cv.findContours(canny, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

      // 4. 輪郭を描画（赤色で線を引く）
      dst = cv.Mat.zeros(src.rows, src.cols, cv.CV_8UC3);
      for (let i = 0; i < contours.size(); ++i) {
        cv.drawContours(dst, contours, i, new cv.Scalar(255, 0, 0, 255), 2);
      }
      
      // 5. 表示
      cv.imshow('outputCanvas', dst);
      
      // 6. メモリ解放
      src.delete(); dst.delete(); gray.delete(); canny.delete(); contours.delete(); hierarchy.delete();
      
      alert("輪郭抽出完了！");
    });
  </script>
</body>
</html>
