<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>酒ゃビック名刺管理システム</title>
  <style>
    body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #000; color: white; }
    #video { width: 100%; height: 50vh; object-fit: cover; }
    #snap { 
    width: 80%; 
    padding: 20px; 
    margin: 20px; 
    font-size: 18px; 
    background: #007bff; 
    color: white; 
    border: none; 
    border-radius: 10px; 
    position: relative; /* 追加 */
    z-index: 100;       /* 追加：確実に手前に表示 */
}
    #snap:disabled { background: #555; }
    #guide-frame { position: absolute; top: 20%; left: 10%; width: 80%; height: 20%; border: 2px solid yellow; box-sizing: border-box; pointer-events: none; }
    #outputCanvas { width: 90%; margin-top: 10px; border: 2px solid green; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.js"></script>
<div id="camera-container" style="position: relative; width: 100%;">
    <video id="video" playsinline autoplay></video>
  </div>
  
  <button id="snap" disabled>カメラ準備中...</button>
  <canvas id="outputCanvas"></canvas>

  <script>
    const video = document.getElementById('video');

    // カメラ起動
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } }
        });
        video.srcObject = stream;
        video.play();
      } catch (err) {
        alert("カメラ起動失敗: " + err);
      }
    }
    startCamera();

    // 撮影処理
    function takeSnapshot() {
      // 念のためopencvがロードされているか確認
      if (typeof cv === 'undefined') {
        alert("OpenCVがまだ読み込まれていません！");
        return;
      }

      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);

      // OpenCV処理
      let src = cv.imread(canvas);
      let dst = new cv.Mat();
      cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
      cv.imshow('outputCanvas', dst);
      
      src.delete(); 
      dst.delete();
    }
  </script>
</body>
</html>
