<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>酒ゃビック名刺管理システム</title>

    <style>
        /* カメラを全画面表示にする */
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #000; }
        #video { width: 100%; height: 70vh; object-fit: cover; }
        #snap { width: 80%; padding: 20px; margin-top: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; }
    .guide-frame {position: absolute; top: 20%; left: 10%; width: 80%; height: 20%; border: 2px solid yellow; box-sizing: border-box;}
    
    </style>
        
</head>
<body>
    <h1>名刺読み取り</h1>
<div id="camera-container" style="position: relative;">
    <video id="video" playsinline autoplay></video>
    <div id="guide-frame" ></div>
</div>
<button id="snap">撮影して送信</button>
<canvas id="canvas" style="display:none;"></canvas>
    
 <script async src="https://docs.opencv.org/master/opencv.js"></script>
    
<script>
  // OpenCVが読み込まれたら呼ばれる関数
  function onOpenCvReady() {
    console.log("OpenCV.js is ready!");
    // ここでカメラ起動の処理を開始すると確実です
    startCamera();
  }

    document.getElementById('snap').addEventListener('click', () => {
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas'); // 内部処理用
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);

    // CanvasからOpenCVのMatへ変換
    let src = cv.imread(canvas);
    
    // ここで画像処理（グレースケール化やトリミング）を実行
    let dst = new cv.Mat();
    cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY); // 例：グレースケール化
    
    // 結果をCanvasに表示（または送信処理へ）
    cv.imshow('outputCanvas', dst);
    
    // 後始末（メモリリークを防ぐために重要）
    src.delete(); 
    dst.delete();
});
</script>
</body>
</html>
