<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>酒ゃビック名刺管理システム</title>
  <style>
    body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #000; color: white; }
    #video { width: 100%; height: 50vh; object-fit: cover; }
    #snap { 
      width: 80%; padding: 20px; margin: 20px; font-size: 18px; 
      background: #007bff; color: white; border: none; border-radius: 10px; 
      position: relative; z-index: 100;
    }
    #snap:disabled { background: #555; }
    #outputCanvas { width: 90%; margin-top: 10px; border: 2px solid green; }
  </style>
</head>
<body>
  
  <script src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.js"></script>
  
  <div id="camera-container" style="position: relative; width: 100%;">
    <video id="video" playsinline autoplay></video>
  </div>
  <button onclick="alert('ボタン自体は生きているよ')">テストボタン</button>
  <button id="snap" disabled>カメラ準備中...</button>
  <canvas id="outputCanvas"></canvas>

  <script>
    const video = document.getElementById('video');

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } }
        });
        video.srcObject = stream;
        video.play();

        // 2秒後にボタンを有効化
        setTimeout(() => {
          const btn = document.getElementById('snap');
          btn.disabled = false;
          btn.innerText = "撮影して輪郭を検出";
        }, 1000);

      } catch (err) {
        alert("カメラ起動失敗: " + err.message);
      }
    }
    startCamera();
    // startCamera(); の直後に以下を追加
window.addEventListener('load', () => {
  const btn = document.getElementById('snap');
  btn.addEventListener('click', function(e) {
    e.preventDefault(); // デフォルトの動作を抑制
    takeSnapshot();
  });
});

    // 撮影処理
    function takeSnapshot() {
      // 1. 撮影確認のアラート
      alert("撮影開始！映像をCanvasにコピーします");

      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);

      // 2. まずは元の映像をそのまま表示（これで出ればOK）
      const outputCanvas = document.getElementById('outputCanvas');
      outputCanvas.width = canvas.width;
      outputCanvas.height = canvas.height;
      outputCanvas.getContext('2d').drawImage(canvas, 0, 0);

      // 3. 次にOpenCVの処理を確認
      try {
        let src = cv.imread(canvas);
        let dst = new cv.Mat();
        cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
        
        // 処理後の画像を表示
        cv.imshow('outputCanvas', dst);
        
        src.delete();
        dst.delete();
        console.log("OpenCV処理完了");
      } catch (err) {
        alert("OpenCV処理でエラー: " + err.message);
      }
    }

     
      const imgData = new ImageData(new Uint8ClampedArray(dst.data, dst.cols, dst.rows), dst.cols, dst.rows);
      outputCanvas.getContext('2d').putImageData(imgData, 0, 0);
      
      src.delete(); 
      dst.delete();
    }
  </script>
</body>
</html>
