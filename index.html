<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { background: #000; color: white; text-align: center; }
    #video { width: 100%; height: 40vh; object-fit: cover; }
    #snap { width: 80%; padding: 20px; margin: 20px; font-size: 18px; background: #007bff; color: white; }
    #outputCanvas { width: 90%; margin-top: 20px; border: 3px solid red; background: #333; }
  </style>
</head>
<body>
  <video id="video" playsinline autoplay></video>
  <button id="snap">映像をCanvasに転送テスト</button>
  <canvas id="outputCanvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('outputCanvas');

    // カメラ起動
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } }
        });
        video.srcObject = stream;
        video.play();
      } catch (err) {
        alert("カメラ起動失敗: " + err);
      }
    }
    startCamera();

    // テスト：映像をそのままコピー
    document.getElementById('snap').addEventListener('click', () => {
      // 1. サイズ合わせ
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      
      // 2. 描画
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      console.log("転送テスト実行: " + canvas.width + "x" + canvas.height);
      alert("転送完了！サイズ: " + canvas.width + "x" + canvas.height);
    });
  </script>
</body>
</html>
