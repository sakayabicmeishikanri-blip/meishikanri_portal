<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { background: #000; color: white; text-align: center; }
    #video { width: 100%; height: 40vh; object-fit: cover; }
    #snap { width: 80%; padding: 20px; margin: 20px; font-size: 18px; background: #007bff; color: white; }
    #outputCanvas { width: 90%; margin-top: 20px; border: 3px solid red; background: #333; }
    #snapBtn { width: 80%; padding: 20px; margin: 20px; font-size: 18px; background: #007bff; color: white; }
    #sendBtn { width: 80%; padding: 20px; margin: 20px; font-size: 18px; background: green; color: white; }
    #retryBtn { width: 80%; padding: 20px; margin: 20px; font-size: 18px; background: red; color: white; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.js"></script>
</head>
<body>
  <video id="video" playsinline autoplay></video>
  <div id="controls">
  <button id="snapBtn">撮影</button>
    <div id="actionBtns" style="display:none;">
    <button id="sendBtn">送信</button>
    <button id="retryBtn">取り直し</button>
  </div>
</div>
  <canvas id="outputCanvas"></canvas>

 <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('outputCanvas');
    const snapBtn = document.getElementById('snapBtn');
    const actionBtns = document.getElementById('actionBtns');
    const sendBtn = document.getElementById('sendBtn');
    const retryBtn = document.getElementById('retryBtn');

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } }
        });
        video.srcObject = stream;
        video.play();
      } catch (err) { alert("カメラ起動失敗: " + err); }
    }
    startCamera();
    
    // 撮影ボタンの処理
    snapBtn.addEventListener('click', () => {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = video.videoWidth;
      tempCanvas.height = video.videoHeight;
      tempCanvas.getContext('2d').drawImage(video, 0, 0);

      let src = cv.imread(tempCanvas);
      let gray = new cv.Mat();
      let canny = new cv.Mat();
      let contours = new cv.MatVector();
      let hierarchy = new cv.Mat();

      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0);
      cv.Canny(gray, canny, 50, 150);
      cv.findContours(canny, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

      if (contours.size() > 0) {
        warpPerspective(src, contours);
        snapBtn.style.display = 'none';
        actionBtns.style.display = 'block';
      } else {
        alert("輪郭が見つかりません。");
      }
      src.delete(); gray.delete(); canny.delete(); contours.delete(); hierarchy.delete();
    });

    // 台形補正関数（外に出しました！）
    function warpPerspective(src, contours) {
      let maxArea = 0;
      let maxContour = null;
      for (let i = 0; i < contours.size(); ++i) {
        let area = cv.contourArea(contours.get(i));
        if (area > maxArea) { maxArea = area; maxContour = contours.get(i); }
      }
      let perimeter = cv.arcLength(maxContour, true);
      let approx = new cv.Mat();
      cv.approxPolyDP(maxContour, approx, 0.02 * perimeter, true);
      if (approx.rows !== 4) {
        alert("認識できませんでした。再度撮影してください。");
        approx.delete();
        return;
      }
      let points = [];
      for (let i = 0; i < 4; i++) {
        points.push({ x: approx.data32S[i * 2], y: approx.data32S[i * 2 + 1] });
      }
      points.sort((a, b) => a.y - b.y);
      let top = points.slice(0, 2).sort((a, b) => a.x - b.x);
      let bottom = points.slice(2, 4).sort((a, b) => a.x - b.x);
      let sortedPoints = [top[0], top[1], bottom[1], bottom[0]];
      let dstWidth = 400;
      let dstHeight = 250;
      let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
        sortedPoints[0].x, sortedPoints[0].y, sortedPoints[1].x, sortedPoints[1].y,
        sortedPoints[2].x, sortedPoints[2].y, sortedPoints[3].x, sortedPoints[3].y
      ]);
      let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, dstWidth, 0, dstWidth, dstHeight, 0, dstHeight]);
      let M = cv.getPerspectiveTransform(srcTri, dstTri);
      let dst = new cv.Mat();
      cv.warpPerspective(src, dst, M, new cv.Size(dstWidth, dstHeight));
      cv.imshow('outputCanvas', dst);
      srcTri.delete(); dstTri.delete(); M.delete(); dst.delete(); approx.delete();
    }

    retryBtn.addEventListener('click', () => {
      actionBtns.style.display = 'none';
      snapBtn.style.display = 'block';
      const context = canvas.getContext('2d');
      context.clearRect(0, 0, canvas.width, canvas.height);
    });

    sendBtn.addEventListener('click', async () => {
      await uploadDirectly(canvas);
      retryBtn.click();
    });

async function uploadDirectly(canvas) {
  const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
  const fileName = `card_${Date.now()}.jpg`;

  // 1. GASから「チケット（署名付きURL）」をもらう
  const gasUrl = 'あなたのデプロイしたGASのURL';
  const response = await fetch(`${gasUrl}?fileName=${fileName}`);
  const uploadUrl = await response.text();

  // 2. そのチケットを使ってGCSへ直行PUT
  const uploadResult = await fetch(uploadUrl, {
    method: 'PUT',
    headers: { 'Content-Type': 'image/jpeg' },
    body: blob
  });

  if (uploadResult.ok) {
    alert('保存完了！GCSへ直行しました。');
  } else {
    alert('保存失敗。');
  }
}

 
  </script>
</body>
</html>
