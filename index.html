<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>酒ゃビック名刺管理システム</title>

    <style>
        /* カメラを全画面表示にする */
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #000; }
        #video { width: 100%; height: 70vh; object-fit: cover; }
        #snap { width: 80%; padding: 20px; margin-top: 20px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 10px; }
    .guide-frame {position: absolute; top: 20%; left: 10%; width: 80%; height: 20%; border: 2px solid yellow; box-sizing: border-box;}
    
    </style>
        
</head>
<body>
    <h1>名刺読み取り</h1>
<div id="camera-container" style="position: relative;">
    <video id="video" playsinline autoplay></video>
    <div id="guide-frame" ></div>
</div>
<button id="snap">撮影して送信</button>
<canvas id="outputCanvas" style="display:none;"></canvas>
    

<script src="opencv.js"></script>
    
<script>
// グローバル変数として宣言しておく
  let src, dst;
  // OpenCVが読み込まれたら呼ばれる関数
  function onOpenCvReady() {
    console.log("OpenCV.js is ready!");
    // ここでカメラ起動の処理を開始すると確実です
    startCamera();
  }

    document.getElementById('snap').addEventListener('click', () => {
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas'); // 内部処理用
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
        
// 変数宣言を let から変更（再宣言しない）
    if (src) src.delete();
    if (dst) dst.delete();

    
    // 【重要】撮影ボタン内の画像処理部分を以下のように書き換えます
let src = cv.imread(canvas);
let gray = new cv.Mat();
cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);// 例：グレースケール化
cv.imshow('outputCanvas', dst);        

// 1. ノイズ除去と輪郭検出
let blurred = new cv.Mat();
cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
let edged = new cv.Mat();
cv.Canny(blurred, edged, 75, 200);

// 2. 輪郭を探す
let contours = new cv.MatVector();
let hierarchy = new cv.Mat();
cv.findContours(edged, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);        
    
    // 結果をCanvasに表示（または送信処理へ）
    cv.imshow('outputCanvas', dst);
    
    // 4. メモリ解放（必須！）
src.delete(); gray.delete(); blurred.delete(); edged.delete(); contours.delete(); hierarchy.delete();
        
});
</script>
</body>
</html>
