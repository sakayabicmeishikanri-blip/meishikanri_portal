<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
<style>
    body { margin: 0; padding: 0; background: #000; overflow: hidden; }
    
#camera-container {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: #000;
  overflow: hidden;
  /* 子要素を中央寄せにする準備 */
  display: flex;
  align-items: center;
  justify-content: center;
}
  #video {
  /* 画面全体を埋めるように配置 */
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 1;
}
#guide-frame {
  position: relative; /* containerの中央配置に追従させる */
  z-index: 2;
  width: 80vw;
  height: calc(80vw * 55 / 91);
  border: 2px solid rgba(255, 255, 0, 0.8);
  pointer-events: none;
}
/* 通常時 */
.guide-default { border: 2px solid rgba(255, 255, 0, 0.8); }

/* 認識成功時 */
.guide-detected { border: 4px solid #00ff00 !important; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.8); }
    
    #controls {
      position: absolute;
      bottom: 50px;
      z-index: 20;
      width: 100%;
      text-align: center;
      padding-bottom: env(safe-area-inset-bottom);
    }

    button {
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 30px;
      border: none;
      margin: 5px;
    }
    #capture-btn { background: #007bff; color: white; }
    #sendBtn { background: green; color: white; }
    #retryBtn { background: red; color: white; }
    
    #outputCanvas {
  display: none;
  width: 80vw;    /* 端末画面幅の80%で表示 */
  height: auto;   /* アスペクト比を維持 */
  margin: 20px auto;
  border: 5px solid #fff;
  /* 画像が拡大表示される際にボケないようにする設定 */
  image-rendering: -webkit-optimize-contrast;
}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.js"></script>
</head>
<body>

<div id="camera-container">
  <video id="video" playsinline autoplay></video>
  <div id="guide-frame"></div>
  <canvas id="outputCanvas"></canvas>
  
  <div id="controls">
    <button id="capture-btn">撮影</button>
    <div id="actionBtns" style="display:none;">
      <button id="sendBtn">送信</button>
      <button id="retryBtn">取り直し</button>
    </div>
  </div>
</div>
  
  
  <script>
const video = document.getElementById('video');
const captureBtn = document.getElementById('capture-btn');
const canvas = document.getElementById('outputCanvas');
const guideFrame = document.getElementById('guide-frame');
const actionBtns = document.getElementById('actionBtns');
const sendBtn = document.getElementById('sendBtn');
const retryBtn = document.getElementById('retryBtn');

let isDetecting = true; // ループ制御フラグ

// 1. カメラ起動
async function startCamera() {
  const constraints = {
    video: {
      width: { ideal: 1920 },
      height: { ideal: 1080 },
      facingMode: { ideal: "environment" },
      advanced: [{ focusMode: "continuous" }]
    }
  };
  try {
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    video.onloadedmetadata = () => detectLoop();
  } catch (err) { alert("カメラアクセスを許可してください"); }
}

// 2. ループ処理
function detectLoop() {
  if (!isDetecting) return;
  if (video.style.display === 'none') return;

  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = 320; tempCanvas.height = 240;
  tempCanvas.getContext('2d').drawImage(video, 0, 0, 320, 240);

  let src = cv.imread(tempCanvas);
  let gray = new cv.Mat();
  let canny = new cv.Mat();
  let contours = new cv.MatVector();
  let hierarchy = new cv.Mat();

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.Canny(gray, canny, 50, 150);
  cv.findContours(canny, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

  let found = false;
  for (let i = 0; i < contours.size(); ++i) {
    let cnt = contours.get(i);
    let approx = new cv.Mat();
    cv.approxPolyDP(cnt, approx, 0.04 * cv.arcLength(cnt, true), true);
    let minArea = (video.videoWidth * video.videoHeight) * 0.1; // 画面の10%以上の面積ならOK
　　if (approx.rows === 4 && cv.contourArea(cnt) > minArea) { found = true; }
    approx.delete();
  }
  guideFrame.className = found ? 'guide-detected' : 'guide-default';

  src.delete(); gray.delete(); canny.delete(); contours.delete(); hierarchy.delete();
  setTimeout(() => requestAnimationFrame(detectLoop), 200);
}

// 3. 撮影処理
captureBtn.addEventListener('click', async () => {
  isDetecting = false; // ループ一時停止
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = video.videoWidth; tempCanvas.height = video.videoHeight;
  tempCanvas.getContext('2d').drawImage(video, 0, 0);

  let src = cv.imread(tempCanvas);
  let gray = new cv.Mat();
  let blur = new cv.Mat();
  let canny = new cv.Mat();
  let contours = new cv.MatVector();
  let hierarchy = new cv.Mat();

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0);
  cv.Canny(blur, canny, 20, 80);
  cv.findContours(canny, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

  let bestContour = null, maxArea = 0;
  for (let i = 0; i < contours.size(); ++i) {
    let cnt = contours.get(i);
    let approx = new cv.Mat();
    cv.approxPolyDP(cnt, approx, 0.04 * cv.arcLength(cnt, true), true);
    if (approx.rows === 4 && cv.contourArea(cnt) > maxArea) {
      maxArea = cv.contourArea(cnt);
      bestContour = cnt;
    }
    approx.delete();
  }

  if (bestContour) {
    warpPerspective(src, bestContour);
    video.style.display = 'none';
    canvas.style.display = 'block';
    captureBtn.style.display = 'none';
    actionBtns.style.display = 'block';
    guideFrame.style.display = 'none';
  } else {
    alert("認識できませんでした。");
    isDetecting = true;
    detectLoop();
  }
  src.delete(); gray.delete(); blur.delete(); canny.delete(); contours.delete(); hierarchy.delete();
});

// 4. Retry処理（重複を排除して一本化）
retryBtn.addEventListener('click', () => {
  video.style.display = 'block';
  canvas.style.display = 'none';
  captureBtn.style.display = 'block';
  actionBtns.style.display = 'none';
  guideFrame.style.display = 'block';
  const context = canvas.getContext('2d');
  context.clearRect(0, 0, canvas.width, canvas.height);
  isDetecting = true;
  detectLoop();
});

// (ここに warpPerspective と uploadDirectly を記載してください)
window.addEventListener('load', startCamera);

    // 台形補正関数（外に出しました！）
function warpPerspective(src, contour) {
  let perimeter = cv.arcLength(contour, true);
  let approx = new cv.Mat();
  cv.approxPolyDP(contour, approx, 0.04 * perimeter, true);

  if (approx.rows !== 4) {
    alert("4隅が認識できませんでした。");
    approx.delete();
    return;
  }

  // 座標取得とソート（既存ロジック維持）
  let points = [];
  for (let i = 0; i < 4; i++) {
    points.push({ x: approx.data32S[i * 2], y: approx.data32S[i * 2 + 1] });
  }
  points.sort((a, b) => a.y - b.y);
  let top = points.slice(0, 2).sort((a, b) => a.x - b.x);
  let bottom = points.slice(2, 4).sort((a, b) => a.x - b.x);
  let sortedPoints = [top[0], top[1], bottom[1], bottom[0]];

  // ★修正：解像度を800x500に引き上げ（ぼやけ防止）
  let dstWidth = 800; 
  let dstHeight = 500;
  
  // Canvasの物理ピクセルサイズを設定
  canvas.width = dstWidth;
  canvas.height = dstHeight;

  let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
    sortedPoints[0].x, sortedPoints[0].y, sortedPoints[1].x, sortedPoints[1].y,
    sortedPoints[2].x, sortedPoints[2].y, sortedPoints[3].x, sortedPoints[3].y
  ]);
  let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, dstWidth, 0, dstWidth, dstHeight, 0, dstHeight]);
  
  let M = cv.getPerspectiveTransform(srcTri, dstTri);
  let dst = new cv.Mat();
  cv.warpPerspective(src, dst, M, new cv.Size(dstWidth, dstHeight));

  // ★明るさ補正（正規化）
  let normalized = new cv.Mat();
  cv.normalize(dst, normalized, 0, 255, cv.NORM_MINMAX);

  // 表示
  cv.imshow('outputCanvas', normalized);

  // メモリ解放
  normalized.delete();
  dst.delete();
  M.delete();
  srcTri.delete();
  dstTri.delete();
  approx.delete();
}
    retryBtn.addEventListener('click', () => {
      actionBtns.style.display = 'none';
      snapBtn.style.display = 'block';
      const context = canvas.getContext('2d');
      context.clearRect(0, 0, canvas.width, canvas.height);
    });

    sendBtn.addEventListener('click', async () => {
      await uploadDirectly(canvas);
      retryBtn.click();
    });

async function uploadDirectly(canvas) {
  const base64data = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
  const fileName = `card_${Date.now()}.jpg`;
  const cloudRunUrl = 'https://meishikanrirun-308432369710.asia-northeast2.run.app';

  try {
    const response = await fetch(cloudRunUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' }, // これが必須です
    body: JSON.stringify({ base64Data: base64data, fileName: fileName })
  });

    if (response.ok) {
      alert('サーバーに送信しました');
    } else {
      const err = await response.text();
      alert('サーバーエラー: ' + err); // 2. サーバーが何か返しているか確認
    }
  } catch (e) {
    alert('通信失敗（ネットワークまたはCORS）: ' + e.message); // 3. ブラウザがブロックしたか確認
  }
}
 
  </script>
</body>
</html>
