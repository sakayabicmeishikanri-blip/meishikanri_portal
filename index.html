<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
<style>
    body { margin: 0; padding: 0; background: #000; overflow: hidden; }
    
    #camera-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 66.6vh;
      object-fit: cover;
    }

    #guide-frame {
     position: absolute;
  /* 画面の中央に配置 */
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  width: 80vw;
  height: calc(80vw * 55 / 91);
  border: 2px solid rgba(255, 255, 0, 0.8);
  box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
  pointer-events: none;
}
    #controls {
      position: absolute;
      bottom: 50px;
      z-index: 20;
      width: 100%;
      text-align: center;
      padding-bottom: env(safe-area-inset-bottom);
    }

    button {
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 30px;
      border: none;
      margin: 5px;
    }
    #capture-btn { background: #007bff; color: white; }
    #sendBtn { background: green; color: white; }
    #retryBtn { background: red; color: white; }
    
    #outputCanvas { 
      display: none; 
      width: 100%; 
      height: 66.6vh;
      object-fit: contain;
      background: #333;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.js"></script>
</head>
<body>

<div id="camera-container">
  <video id="video" playsinline autoplay></video>
  <div id="guide-frame"></div>
  <canvas id="outputCanvas"></canvas>
  
  <div id="controls">
    <button id="capture-btn">撮影</button>
    <div id="actionBtns" style="display:none;">
      <button id="sendBtn">送信</button>
      <button id="retryBtn">取り直し</button>
    </div>
  </div>
</div>
  
 <script>
    const video = document.getElementById('video');
const captureBtn = document.getElementById('capture-btn');
    const canvas = document.getElementById('outputCanvas');
    const snapBtn = document.getElementById('snapBtn');
    const actionBtns = document.getElementById('actionBtns');
    const sendBtn = document.getElementById('sendBtn');
    const retryBtn = document.getElementById('retryBtn');

async function startCamera() {
  // ★ここを書き換えます
  const constraints = {
    video: {
      // 画面の幅・高さを基準にする
      width: { ideal: window.screen.width * window.devicePixelRatio },
      height: { ideal: window.screen.height * window.devicePixelRatio },
      facingMode: { ideal: "environment" } ,// 背面カメラを優先
      advanced: [{ focusMode: "continuous" }] // 可能ならオートフォーカスを継続
    }
  };

  try {
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    console.log("カメラが高画質設定で起動しました");
  } catch (err) {
    console.error("カメラの起動に失敗しました: ", err);
    alert("カメラへのアクセスを許可してください");
  }
}

// 3. ページ読み込み時に実行
window.addEventListener('load', startCamera);

  // 撮影ボタン処理
  // 撮影処理内のOpenCVロジックを以下に差し替え
captureBtn.addEventListener('click', async () => {
  // 1. 画像読み込み
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = video.videoWidth;
  tempCanvas.height = video.videoHeight;
  tempCanvas.getContext('2d').drawImage(video, 0, 0);

  let src = cv.imread(tempCanvas);
  let gray = new cv.Mat();
  let blur = new cv.Mat();
  let canny = new cv.Mat();
  let contours = new cv.MatVector();
  let hierarchy = new cv.Mat();

  // 2. 前処理：コントラストを抑えてエッジを出しやすくする
  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0);
  
  // ★変更点：adaptiveThresholdを外し、Cannyで直接エッジを出す方が安定する場合が多い
  cv.Canny(blur, canny, 30, 100); 

  // 3. 輪郭抽出
  cv.findContours(canny, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

  // 4. 最適な輪郭（4点に近似できる最大のもの）を探す
  let bestContour = null;
  let maxArea = 0;

  for (let i = 0; i < contours.size(); ++i) {
    let cnt = contours.get(i);
    let area = cv.contourArea(cnt);
    if (area < 1000) continue; // 小さすぎるノイズは無視

    let perimeter = cv.arcLength(cnt, true);
    let approx = new cv.Mat();
    cv.approxPolyDP(cnt, approx, 0.02 * perimeter, true);

    // ★重要：4点に近似できるかチェック
    if (approx.rows === 4 && area > maxArea) {
      maxArea = area;
      bestContour = cnt;
    }
    approx.delete();
  }

  // 5. 結果処理
  if (bestContour) {
    warpPerspective(src, bestContour);
    // ...以降、表示切り替え処理
  } else {
    alert("名刺の4隅が見つかりませんでした。名刺の背景と色がはっきり分かれる場所で撮影してください。");
  }

  src.delete(); gray.delete(); blur.delete(); canny.delete(); contours.delete(); hierarchy.delete();
});

    // 台形補正関数（外に出しました！）
// warpPerspective の完全版ロジック
  function warpPerspective(src, contour) {
    let perimeter = cv.arcLength(contour, true);
    let approx = new cv.Mat();
    cv.approxPolyDP(contour, approx, 0.02 * perimeter, true);
    
    if (approx.rows !== 4) {
      alert("4隅が認識できませんでした。");
      approx.delete();
      return;
    }

    let points = [];
    for (let i = 0; i < 4; i++) {
      points.push({ x: approx.data32S[i * 2], y: approx.data32S[i * 2 + 1] });
    }
    // 座標のソート（台形補正用）
    points.sort((a, b) => a.y - b.y);
    let top = points.slice(0, 2).sort((a, b) => a.x - b.x);
    let bottom = points.slice(2, 4).sort((a, b) => a.x - b.x);
    let sortedPoints = [top[0], top[1], bottom[1], bottom[0]];

    let dstWidth = 400, dstHeight = 250;
    let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
      sortedPoints[0].x, sortedPoints[0].y, sortedPoints[1].x, sortedPoints[1].y,
      sortedPoints[2].x, sortedPoints[2].y, sortedPoints[3].x, sortedPoints[3].y
    ]);
    let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, dstWidth, 0, dstWidth, dstHeight, 0, dstHeight]);
    let M = cv.getPerspectiveTransform(srcTri, dstTri);
    let dst = new cv.Mat();
    cv.warpPerspective(src, dst, M, new cv.Size(dstWidth, dstHeight));
    
    cv.imshow('outputCanvas', dst);
    
    srcTri.delete(); dstTri.delete(); M.delete(); dst.delete(); approx.delete();
  }
    retryBtn.addEventListener('click', () => {
      actionBtns.style.display = 'none';
      snapBtn.style.display = 'block';
      const context = canvas.getContext('2d');
      context.clearRect(0, 0, canvas.width, canvas.height);
    });

    sendBtn.addEventListener('click', async () => {
      await uploadDirectly(canvas);
      retryBtn.click();
    });

async function uploadDirectly(canvas) {
  const base64data = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
  const fileName = `card_${Date.now()}.jpg`;
  const cloudRunUrl = 'https://meishikanrirun-308432369710.asia-northeast2.run.app';

  try {
    const response = await fetch(cloudRunUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' }, // これが必須です
    body: JSON.stringify({ base64Data: base64data, fileName: fileName })
  });

    if (response.ok) {
      alert('サーバーに送信しました');
    } else {
      const err = await response.text();
      alert('サーバーエラー: ' + err); // 2. サーバーが何か返しているか確認
    }
  } catch (e) {
    alert('通信失敗（ネットワークまたはCORS）: ' + e.message); // 3. ブラウザがブロックしたか確認
  }
}
 
  </script>
</body>
</html>
