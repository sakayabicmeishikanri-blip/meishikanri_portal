name: Upload to GAS
on:
  push:
    branches: [ "main" ]

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # 必須：OIDCトークン発行に必要

    steps:
      - uses: actions/checkout@v3

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v1'
        with:
          # ここにさっき作ったWorkload IdentityのIDを入力
          workload_identity_provider: 'projects/308432369710/locations/global/workloadIdentityPools/github-actions-bot/providers/github'
          service_account: 'github-actions-bot@github-actions-bot.iam.gserviceaccount.com'

      - name: 'Send to GAS'
        run: |
          curl -L -X POST "https://script.google.com/macros/s/【あなたのGASのデプロイID】/exec" \
            -H "Content-Type: application/json" \
            -d '{
              "fileName": "test.jpg",
              "image": "data:image/jpeg;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII="
            }'
